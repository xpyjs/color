<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Pink / Rose -->
    <linearGradient id="pink" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FB7185"/>
      <stop offset="100%" stop-color="#F472B6"/>
    </linearGradient>
    <!-- Amber / Orange -->
    <linearGradient id="amber" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#F97316"/>
    </linearGradient>
    <!-- Emerald / Green (brand) -->
    <linearGradient id="emerald" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#34D399"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
    <!-- Indigo / Violet -->
    <linearGradient id="violet" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
    <!-- Center glow -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="white" stop-opacity="1"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.85"/>
    </radialGradient>
    <!-- Outer soft shadow -->
    <filter id="shadow">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#0004"/>
    </filter>
  </defs>

  <!--
    Four quarter-circle petals with a cross-shaped gap between them.
    The gap subtly references the "X" / "+" in xcolor.
    Center: (256, 256), Radius: 190, Gap half-width: 16
  -->
  <g filter="url(#shadow)">
    <!-- Top-right: Pink -->
    <path d="M272 240 L272 67 A190 190 0 0 1 445 240 Z" fill="url(#pink)"/>
    <!-- Bottom-right: Amber -->
    <path d="M272 272 L445 272 A190 190 0 0 1 272 445 Z" fill="url(#amber)"/>
    <!-- Bottom-left: Emerald -->
    <path d="M240 272 L240 445 A190 190 0 0 1 67 272 Z" fill="url(#emerald)"/>
    <!-- Top-left: Violet -->
    <path d="M240 240 L67 240 A190 190 0 0 1 240 67 Z" fill="url(#violet)"/>
  </g>

  <!-- Central accent dot -->
  <circle cx="256" cy="256" r="20" fill="url(#glow)"/>
</svg>
